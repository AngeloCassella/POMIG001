spring.application.name=19-SpringSecurity

# Parametri di accesso al DB MySQL
spring.datasource.driver-class-name= com.mysql.cj.jdbc.Driver
spring.datasource.url= jdbc:mysql://localhost:3306/pomig001_spring_security
spring.datasource.username= root
spring.datasource.password= root
spring.jpa.hibernate.ddl-auto= update
spring.jpa.hibernate.dialect= org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.default_schema= public

# Parametri di configurazione Logback
logging.pattern.console= %-5level %logger{36} - %msg%n
logging.pattern.file= %d{dd-MM-YYYY HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.path= logs/
logging.file.name= logs/application.log
logging.level.root= INFO

# Parametri di configurazione JWT (Json Web Token)
app.jwt-secret=mysecretcodelungalungalungalungalungalungalungalunga
app.jwt-expiration-milliseconds= 86400000

